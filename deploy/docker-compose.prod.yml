# NocoCRM 生产环境编排（T17.05）
# 用法：docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env.production up -d
#
# 栈：NocoBase app + PostgreSQL 16 + Redis 7 + Nginx（HTTPS 反代）

version: "3.9"

networks:
  nococrm:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  nocobase_storage:

services:
  app:
    build:
      context: ../project
      dockerfile: Dockerfile
    image: nococrm-app:latest
    restart: always
    networks:
      - nococrm
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      APP_ENV: production
      APP_PORT: 13000
      APP_KEY: ${APP_KEY}
      CLUSTER_MODE: ${CLUSTER_MODE:-2}
      DB_DIALECT: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      CACHE_DEFAULT_STORE: redis
      CACHE_REDIS_URL: redis://redis:6379/0
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      LOGGER_TRANSPORT: dailyRotateFile
      LOGGER_LEVEL: ${LOGGER_LEVEL:-info}
      OPS_ALERT_EMAIL: ${OPS_ALERT_EMAIL}
      OPS_ALERT_WEBHOOK: ${OPS_ALERT_WEBHOOK}
    volumes:
      - nocobase_storage:/app/nocobase/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:13000/api/app:getInfo"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  postgres:
    image: postgres:16
    restart: always
    networks:
      - nococrm
    command: postgres -c wal_level=logical -c max_connections=200
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: always
    networks:
      - nococrm
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  nginx:
    image: nginx:1.27
    restart: always
    networks:
      - nococrm
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nococrm.conf:/etc/nginx/conf.d/default.conf:ro
      # Let's Encrypt 证书（用 certbot 申请后挂载）
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx/certbot-www:/var/www/certbot:ro
