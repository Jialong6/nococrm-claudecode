# NocoCRM Nginx 反向代理 + HTTPS（T17.05）
# 替换 nococrm.example.com 为你的真实域名

# 80 → 443 重定向 + ACME 验证
server {
    listen 80;
    server_name nococrm.example.com;

    # certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name nococrm.example.com;

    ssl_certificate     /etc/letsencrypt/live/nococrm.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nococrm.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    # 附件上传上限（与 NocoBase file-manager 对齐）
    client_max_body_size 50M;

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # API + 应用统一反代到 NocoBase
    location / {
        proxy_pass http://app:13000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket（NocoBase 实时通知）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        proxy_pass http://app:13000;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
